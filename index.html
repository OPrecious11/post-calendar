<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostCal — 30-Day Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- APP HEADER -->
  <header class="app-header">
    <div class="header-left">
      <span class="app-logo">📅</span>
      <div>
        <h1 class="app-title">PostCal</h1>
        <p class="app-subtitle">Your 30-day content schedule</p>
        <p class="app-streak" id="streakCounter"></p>
      </div>
    </div>
    <div class="header-actions">
      <div class="export-wrapper">
        <button class="btn-export" id="exportBtn">↗ Export</button>
        <div class="export-dropdown" id="exportDropdown" style="display:none;">
          <button class="export-option" id="exportCSV">📊 Export as CSV</button>
          <button class="export-option" id="exportPDF">📄 Export as PDF</button>
        </div>
      </div>
      <button class="btn-notify" id="enableNotifications">
        🔔 Enable Reminders
      </button>
    </div>
  </header>

  <!-- PROGRESS BAR -->
  <section class="progress-section">
    <div class="progress-meta">
      <span class="progress-label">Days scheduled</span>
      <span class="progress-count">
        <span id="scheduledCount">0</span> / <span id="totalCount">30</span>
      </span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </section>

  <!-- MAIN LAYOUT -->
  <main class="app-main">

    <!-- CALENDAR -->
    <section class="calendar-section">
      <div class="calendar-nav">
        <button class="btn-month-nav" id="prevMonth">‹</button>
        <span class="month-label" id="monthLabel">June 2026</span>
        <button class="btn-month-nav" id="nextMonth">›</button>
      </div>
      <div class="calendar-weekdays">
        <span>MON</span>
        <span>TUE</span>
        <span>WED</span>
        <span>THU</span>
        <span>FRI</span>
        <span>SAT</span>
        <span>SUN</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <!-- DAY DETAIL PANEL -->
    <aside class="detail-panel" id="detailPanel">

      <!-- Empty state -->
      <div class="panel-empty" id="panelEmpty">
        <span class="panel-empty-icon">👆</span>
        <p>Select a day to schedule your post</p>
      </div>

      <!-- Post list view -->
      <div class="panel-posts" id="panelPosts" style="display:none;">
        <div class="panel-header">
          <h2 class="panel-day-label" id="panelDayLabel">Day 1</h2>
          <button class="btn-close" id="closePanel">✕</button>
        </div>
        <div class="posts-list" id="postsList"></div>
        <button class="btn-add-new" id="addNewPost">+ Add New Post</button>
      </div>

      <!-- Form -->
      <div class="panel-form" id="panelForm" style="display:none;">
        <div class="panel-header">
          <h2 class="panel-form-label" id="panelFormLabel">New Post</h2>
          <button class="btn-close" id="backToList">✕</button>
        </div>

        <div class="form-group">
          <label class="form-label" for="postTopic">Post Topic</label>
          <input class="form-input" type="text" id="postTopic"
            placeholder="e.g. Monday motivation tip" />
        </div>

        <div class="form-group">
          <label class="form-label" for="postCaption">Caption / Notes</label>
          <textarea class="form-textarea" id="postCaption" rows="3"
            placeholder="Write your caption or key points..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Platform</label>
          <div class="platform-tags" id="platformTags">
            <button class="platform-btn" data-platform="instagram">📸 Instagram</button>
            <button class="platform-btn" data-platform="twitter">🐦 Twitter</button>
            <button class="platform-btn" data-platform="linkedin">💼 LinkedIn</button>
            <button class="platform-btn" data-platform="tiktok">🎵 TikTok</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Post Status</label>
          <div class="status-tags" id="statusTags">
            <button class="status-btn" data-status="draft">✏️ Draft</button>
            <button class="status-btn" data-status="ready">✅ Ready</button>
            <button class="status-btn" data-status="posted">🚀 Posted</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="postTime">Reminder Time</label>
          <input class="form-input" type="time" id="postTime" value="09:00" />
        </div>

        <div class="panel-actions">
          <button class="btn-save" id="savePost">Save Post</button>
        </div>
      </div>

    </aside>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
